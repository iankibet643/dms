name: my_desktop_uploader
description: Sphere DMS — Document Management System
publish_to: "none"
version: 2.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State Management
  get: ^4.6.6
  get_storage: ^2.1.1

  # HTTP & API
  dio: ^5.4.0

  # File Operations
  file_picker: ^6.1.1
  path_provider: ^2.1.1
  path: ^1.8.3
  mime: ^1.0.5

  # Open files / links
  url_launcher: ^6.2.2

  # UI & Icons
  font_awesome_flutter: ^10.6.0
  loading_animation_widget: ^1.2.0+4
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.10+1
  shimmer: ^3.0.0
  intl: ^0.19.0

  # Image/File Preview
  open_file: ^3.3.2

  # Charts (dashboard stats)
  fl_chart: ^0.68.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
